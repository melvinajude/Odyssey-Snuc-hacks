<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odyssey FinTech | Next-Gen Banking</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">ODYSSEY</div>
        <ul class="nav-links">
            <li><a href="#features">Features</a></li>
            <li><a href="#dashboard">Dashboard</a></li>
            <li><button class="btn-primary">Get Early Access</button></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>The Future of <span class="gradient-text">Finance</span> is Here.</h1>
            <p>Experience seamless transactions, AI-driven insights, and enterprise-grade security. Odyssey is built for the modern economy.</p>
            <div class="cta-group">
                <button class="btn-primary glow-btn">Start your journey</button>
                <button class="btn-secondary">View Demo</button>
            </div>
        </div>
        <div class="hero-image">
            <div class="glass-card">
                <div class="card-header">
                    <h3>Total Balance</h3>
                    <p class="balance">$124,500.00</p>
                </div>
                <div class="card-body">
                    <div class="transaction-list">
                        <!-- Trans items generated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </header>

    <script src="script.js"></script>
</body>
</html>
